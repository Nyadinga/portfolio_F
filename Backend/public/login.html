<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="css/css_login.css" />
    <title>Login</title>
  </head>
  <body>
    <div class="container-center">
      <div class="card">
        <h2>Admin Login</h2>

        <form method="POST" action="/login">
          <input name="username" placeholder="Username" required />
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
          <button type="submit">Login</button>
        </form>
      </div>
    </div>
  </body>
</html>
